name: Firebase production and PR previews

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

jobs:
  classify-changes:
    name: Classify deployment changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      hosting: ${{ steps.changes.outputs.hosting }}
      backend: ${{ steps.changes.outputs.backend }}

    steps:
      - name: Checkout changed revision
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Classify changed files
        id: changes
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            base_sha="$PR_BASE_SHA"
            head_sha="$PR_HEAD_SHA"
          else
            base_sha="$PUSH_BEFORE_SHA"
            head_sha="$GITHUB_SHA"
          fi

          if [[ -z "$base_sha" || "$base_sha" =~ ^0+$ ]] || ! git cat-file -e "${base_sha}^{commit}" 2>/dev/null; then
            base_sha="$(git hash-object -t tree /dev/null)"
          fi

          hosting=false
          backend=false
          changed_files=()

          while IFS= read -r -d '' file; do
            changed_files+=("$file")

            case "$file" in
              *.md|src/*.test.ts|src/*.spec.ts|functions/*.test.ts|functions/*.spec.ts)
                ;;
              firebase.json)
                hosting=true
                backend=true
                ;;
              src/*|public/*|index.html|package.json|package-lock.json|postcss.config.js|tailwind.config.js|tsconfig.json|tsconfig.app.json|tsconfig.node.json|vite.config.ts)
                hosting=true
                ;;
              functions/*|firestore.rules|firestore.indexes.json)
                backend=true
                ;;
            esac
          done < <(git diff --name-only -z "$base_sha" "$head_sha")

          echo "hosting=$hosting" >> "$GITHUB_OUTPUT"
          echo "backend=$backend" >> "$GITHUB_OUTPUT"

          {
            echo "### Deployment classification"
            echo ""
            echo "- Hosting: \`$hosting\`"
            echo "- Functions / Firestore: \`$backend\`"
            echo ""
            echo "Changed files:"
            if ((${#changed_files[@]} == 0)); then
              echo "- (none)"
            else
              printf -- '- `%s`\n' "${changed_files[@]}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  validate-hosting:
    name: Test and build Hosting
    if: >-
      needs.classify-changes.outputs.hosting == 'true' &&
      (github.event_name == 'push' || vars.ENABLE_FIREBASE_PREVIEW == 'true')
    needs: classify-changes
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install frontend dependencies
        run: npm ci

      - name: Test frontend
        run: npm test

      - name: Validate public web-app configuration
        env:
          VITE_FIREBASE_API_KEY: ${{ github.event_name == 'push' && vars.PRODUCTION_FIREBASE_API_KEY || vars.STAGING_FIREBASE_API_KEY }}
          VITE_FIREBASE_APP_ID: ${{ github.event_name == 'push' && vars.PRODUCTION_FIREBASE_APP_ID || vars.STAGING_FIREBASE_APP_ID }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ github.event_name == 'push' && vars.PRODUCTION_FIREBASE_AUTH_DOMAIN || vars.STAGING_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ github.event_name == 'push' && vars.PRODUCTION_FIREBASE_MEASUREMENT_ID || vars.STAGING_FIREBASE_MEASUREMENT_ID }}
          VITE_FIREBASE_PROJECT_ID: ${{ github.event_name == 'push' && vars.PRODUCTION_FIREBASE_PROJECT_ID || vars.STAGING_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_RECAPTCHA_ENTERPRISE_SITE_KEY: ${{ github.event_name == 'push' && vars.PRODUCTION_FIREBASE_RECAPTCHA_ENTERPRISE_SITE_KEY || vars.STAGING_FIREBASE_RECAPTCHA_ENTERPRISE_SITE_KEY }}
        run: |
          test -n "$VITE_FIREBASE_API_KEY"
          test -n "$VITE_FIREBASE_APP_ID"
          test -n "$VITE_FIREBASE_AUTH_DOMAIN"
          test -n "$VITE_FIREBASE_PROJECT_ID"
          test -n "$VITE_FIREBASE_RECAPTCHA_ENTERPRISE_SITE_KEY"
          if [ "${{ github.event_name }}" = "push" ]; then test -n "$VITE_FIREBASE_MEASUREMENT_ID"; fi

      - name: Build configured web app
        env:
          VITE_FIREBASE_API_KEY: ${{ github.event_name == 'push' && vars.PRODUCTION_FIREBASE_API_KEY || vars.STAGING_FIREBASE_API_KEY }}
          VITE_FIREBASE_APP_ID: ${{ github.event_name == 'push' && vars.PRODUCTION_FIREBASE_APP_ID || vars.STAGING_FIREBASE_APP_ID }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ github.event_name == 'push' && vars.PRODUCTION_FIREBASE_AUTH_DOMAIN || vars.STAGING_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ github.event_name == 'push' && vars.PRODUCTION_FIREBASE_MEASUREMENT_ID || vars.STAGING_FIREBASE_MEASUREMENT_ID }}
          VITE_FIREBASE_PROJECT_ID: ${{ github.event_name == 'push' && vars.PRODUCTION_FIREBASE_PROJECT_ID || vars.STAGING_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_RECAPTCHA_ENTERPRISE_SITE_KEY: ${{ github.event_name == 'push' && vars.PRODUCTION_FIREBASE_RECAPTCHA_ENTERPRISE_SITE_KEY || vars.STAGING_FIREBASE_RECAPTCHA_ENTERPRISE_SITE_KEY }}
        run: npm run build

      - name: Upload Hosting artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: firebase-hosting-${{ github.run_id }}
          path: dist
          if-no-files-found: error
          retention-days: 3

  validate-backend:
    name: Test and build Functions / Firestore
    if: needs.classify-changes.outputs.backend == 'true'
    needs: classify-changes
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Setup Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Install rules-test dependencies
        run: npm ci

      - name: Install Functions dependencies
        run: npm --prefix functions ci --ignore-scripts

      - name: Test Firestore rules
        run: npm run test:rules

      - name: Test Functions
        run: npm run test:functions

      - name: Build Functions
        run: npm run build:functions

  deploy-production-hosting:
    name: Deploy production Hosting
    if: github.event_name == 'push' && needs.classify-changes.outputs.hosting == 'true'
    needs:
      - classify-changes
      - validate-hosting
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: https://boundary-notes-prod.web.app
    concurrency:
      group: firebase-hosting-production
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout trusted Hosting configuration
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Download tested Hosting artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: firebase-hosting-${{ github.run_id }}
          path: dist

      - name: Install pinned Firebase CLI
        run: npm install --global firebase-tools@15.23.0 --ignore-scripts --no-audit --no-fund

      - name: Validate production deployment variables
        env:
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
          GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
        run: |
          test -n "$FIREBASE_PROJECT_ID"
          test -n "$GCP_SERVICE_ACCOUNT"
          test -n "$GCP_WORKLOAD_IDENTITY_PROVIDER"

      - name: Authenticate to Google Cloud with short-lived credentials
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          project_id: ${{ vars.FIREBASE_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Deploy production Hosting
        env:
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
        run: >-
          firebase deploy
          --only hosting
          --project "$FIREBASE_PROJECT_ID"
          --non-interactive

  deploy-production-backend:
    name: Deploy production Functions / Firestore
    if: github.event_name == 'push' && needs.classify-changes.outputs.backend == 'true'
    needs:
      - classify-changes
      - validate-backend
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: production
    concurrency:
      group: firebase-backend-production
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout trusted backend configuration
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install Functions dependencies
        run: npm --prefix functions ci --ignore-scripts

      - name: Install pinned Firebase CLI
        run: npm install --global firebase-tools@15.23.0 --ignore-scripts --no-audit --no-fund

      - name: Validate production deployment variables
        env:
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
          GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
        run: |
          test -n "$FIREBASE_PROJECT_ID"
          test -n "$GCP_SERVICE_ACCOUNT"
          test -n "$GCP_WORKLOAD_IDENTITY_PROVIDER"

      - name: Authenticate to Google Cloud with short-lived credentials
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          project_id: ${{ vars.FIREBASE_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Deploy production Functions and Firestore configuration
        env:
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
        run: >-
          firebase deploy
          --only functions,firestore:rules,firestore:indexes
          --project "$FIREBASE_PROJECT_ID"
          --non-interactive

  deploy-preview:
    name: Deploy isolated PR Hosting preview
    if: >-
      vars.ENABLE_FIREBASE_PREVIEW == 'true' &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      needs.classify-changes.outputs.hosting == 'true'
    needs:
      - classify-changes
      - validate-hosting
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: preview
    concurrency:
      group: firebase-hosting-preview-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      contents: read
      id-token: write
      pull-requests: write

    steps:
      - name: Checkout trusted Hosting configuration
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Download tested Hosting artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: firebase-hosting-${{ github.run_id }}
          path: dist

      - name: Install pinned Firebase CLI
        run: npm install --global firebase-tools@15.23.0 --ignore-scripts --no-audit --no-fund

      - name: Validate staging deployment variables
        env:
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
          GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
        run: |
          test -n "$FIREBASE_PROJECT_ID"
          test -n "$GCP_SERVICE_ACCOUNT"
          test -n "$GCP_WORKLOAD_IDENTITY_PROVIDER"

      - name: Authenticate to Google Cloud with short-lived credentials
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          project_id: ${{ vars.FIREBASE_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Deploy seven-day preview channel
        env:
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
          PREVIEW_CHANNEL: pr-${{ github.event.pull_request.number }}
        run: >-
          firebase hosting:channel:deploy "$PREVIEW_CHANNEL"
          --expires 7d
          --project "$FIREBASE_PROJECT_ID"
          --non-interactive
          --json > preview-result.json

      - name: Add or update preview link on the pull request
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        env:
          PREVIEW_RESULT_PATH: preview-result.json
        with:
          script: |
            const fs = require('fs');
            const result = JSON.parse(fs.readFileSync(process.env.PREVIEW_RESULT_PATH, 'utf8'));
            const urls = new Set();

            function collectUrls(value) {
              if (typeof value === 'string' && value.startsWith('https://')) {
                urls.add(value);
                return;
              }

              if (Array.isArray(value)) {
                value.forEach(collectUrls);
                return;
              }

              if (value && typeof value === 'object') {
                Object.values(value).forEach(collectUrls);
              }
            }

            collectUrls(result);
            const previewUrl = [...urls].find((url) => url.includes('.web.app'));

            if (!previewUrl) {
              core.setFailed('Firebase CLI output did not contain a preview URL.');
              return;
            }

            const marker = '<!-- boundary-notes-firebase-preview -->';
            const body = [
              marker,
              `Firebase Hosting 預覽：${previewUrl}`,
              '',
              '這個連結會在最後一次部署後保留 7 天，且只連到 staging Firebase project。',
            ].join('\n');
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find(
              (comment) => comment.user?.type === 'Bot' && comment.body?.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
