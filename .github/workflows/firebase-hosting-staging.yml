name: Firebase staging

on:
  push:
    branches:
      - staging

permissions:
  contents: read

jobs:
  classify-changes:
    name: Classify deployment changes
    if: vars.ENABLE_FIREBASE_STAGING == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      hosting: ${{ steps.changes.outputs.hosting }}
      backend: ${{ steps.changes.outputs.backend }}

    steps:
      - name: Checkout changed revision
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Classify changed files
        id: changes
        shell: bash
        env:
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail

          base_sha="$PUSH_BEFORE_SHA"
          head_sha="$GITHUB_SHA"

          if [[ -z "$base_sha" || "$base_sha" =~ ^0+$ ]] || ! git cat-file -e "${base_sha}^{commit}" 2>/dev/null; then
            base_sha="$(git hash-object -t tree /dev/null)"
          fi

          hosting=false
          backend=false
          changed_files=()

          while IFS= read -r -d '' file; do
            changed_files+=("$file")

            case "$file" in
              *.md|src/*.test.ts|src/*.spec.ts|functions/*.test.ts|functions/*.spec.ts)
                ;;
              firebase.json)
                hosting=true
                backend=true
                ;;
              src/*|public/*|index.html|package.json|package-lock.json|postcss.config.js|tailwind.config.js|tsconfig.json|tsconfig.app.json|tsconfig.node.json|vite.config.ts)
                hosting=true
                ;;
              functions/*|firestore.rules|firestore.indexes.json)
                backend=true
                ;;
            esac
          done < <(git diff --name-only -z "$base_sha" "$head_sha")

          echo "hosting=$hosting" >> "$GITHUB_OUTPUT"
          echo "backend=$backend" >> "$GITHUB_OUTPUT"

          {
            echo "### Deployment classification"
            echo ""
            echo "- Hosting: \`$hosting\`"
            echo "- Functions / Firestore: \`$backend\`"
            echo ""
            echo "Changed files:"
            if ((${#changed_files[@]} == 0)); then
              echo "- (none)"
            else
              printf -- '- `%s`\n' "${changed_files[@]}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  validate-hosting:
    name: Test and build Hosting
    if: needs.classify-changes.outputs.hosting == 'true'
    needs: classify-changes
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install frontend dependencies
        run: npm ci

      - name: Test frontend
        run: npm test

      - name: Validate public staging web-app configuration
        env:
          VITE_FIREBASE_API_KEY: ${{ vars.STAGING_FIREBASE_API_KEY }}
          VITE_FIREBASE_APP_ID: ${{ vars.STAGING_FIREBASE_APP_ID }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.STAGING_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ vars.STAGING_FIREBASE_MEASUREMENT_ID }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.STAGING_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_RECAPTCHA_ENTERPRISE_SITE_KEY: ${{ vars.STAGING_FIREBASE_RECAPTCHA_ENTERPRISE_SITE_KEY }}
        run: |
          test -n "$VITE_FIREBASE_API_KEY"
          test -n "$VITE_FIREBASE_APP_ID"
          test -n "$VITE_FIREBASE_AUTH_DOMAIN"
          test -n "$VITE_FIREBASE_PROJECT_ID"
          test -n "$VITE_FIREBASE_RECAPTCHA_ENTERPRISE_SITE_KEY"

      - name: Build configured staging web app
        env:
          VITE_FIREBASE_API_KEY: ${{ vars.STAGING_FIREBASE_API_KEY }}
          VITE_FIREBASE_APP_ID: ${{ vars.STAGING_FIREBASE_APP_ID }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.STAGING_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ vars.STAGING_FIREBASE_MEASUREMENT_ID }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.STAGING_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_RECAPTCHA_ENTERPRISE_SITE_KEY: ${{ vars.STAGING_FIREBASE_RECAPTCHA_ENTERPRISE_SITE_KEY }}
        run: npm run build

      - name: Upload Hosting artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: firebase-hosting-${{ github.run_id }}
          path: dist
          if-no-files-found: error
          retention-days: 3

  validate-backend:
    name: Test and build Functions / Firestore
    if: needs.classify-changes.outputs.backend == 'true'
    needs: classify-changes
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Setup Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Install rules-test dependencies
        run: npm ci

      - name: Install Functions dependencies
        run: npm --prefix functions ci --ignore-scripts

      - name: Test Firestore rules
        run: npm run test:rules

      - name: Test Functions
        run: npm run test:functions

      - name: Build Functions
        run: npm run build:functions

  deploy-staging-hosting:
    name: Deploy staging Hosting
    if: needs.classify-changes.outputs.hosting == 'true'
    needs:
      - classify-changes
      - validate-hosting
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: staging
    concurrency:
      group: firebase-hosting-staging
      cancel-in-progress: true
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout trusted Hosting configuration
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Download tested Hosting artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: firebase-hosting-${{ github.run_id }}
          path: dist

      - name: Install pinned Firebase CLI
        run: npm install --global firebase-tools@15.23.0 --ignore-scripts --no-audit --no-fund

      - name: Validate staging deployment variables
        env:
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
          GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
        run: |
          test -n "$FIREBASE_PROJECT_ID"
          test -n "$GCP_SERVICE_ACCOUNT"
          test -n "$GCP_WORKLOAD_IDENTITY_PROVIDER"

      - name: Authenticate to Google Cloud with short-lived credentials
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          project_id: ${{ vars.FIREBASE_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Deploy staging Hosting
        env:
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
        run: >-
          firebase deploy
          --only hosting
          --project "$FIREBASE_PROJECT_ID"
          --non-interactive

  deploy-staging-backend:
    name: Deploy staging Functions / Firestore
    if: needs.classify-changes.outputs.backend == 'true'
    needs:
      - classify-changes
      - validate-backend
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: staging
    concurrency:
      group: firebase-backend-staging
      cancel-in-progress: true
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout trusted backend configuration
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Install Functions dependencies
        run: npm --prefix functions ci --ignore-scripts

      - name: Install pinned Firebase CLI
        run: npm install --global firebase-tools@15.23.0 --ignore-scripts --no-audit --no-fund

      - name: Validate staging deployment variables
        env:
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
          GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
        run: |
          test -n "$FIREBASE_PROJECT_ID"
          test -n "$GCP_SERVICE_ACCOUNT"
          test -n "$GCP_WORKLOAD_IDENTITY_PROVIDER"

      - name: Authenticate to Google Cloud with short-lived credentials
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          project_id: ${{ vars.FIREBASE_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Deploy staging Functions and Firestore configuration
        env:
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
        run: >-
          firebase deploy
          --only functions,firestore:rules,firestore:indexes
          --project "$FIREBASE_PROJECT_ID"
          --non-interactive
